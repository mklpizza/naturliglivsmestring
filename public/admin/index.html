<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Indholdsstyring — Naturliglivsmestring</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
  (function () {
    function computeSlug(title) {
      if (!title) return 'ny-side';
      return title.toString().toLowerCase()
        .replace(/æ/g, 'ae').replace(/ø/g, 'oe').replace(/å/g, 'aa')
        .replace(/é|è|ê|ë/g, 'e').replace(/á|à|â|ä/g, 'a')
        .replace(/í|ì|î|ï/g, 'i').replace(/ó|ò|ô|ö/g, 'o')
        .replace(/ú|ù|û|ü/g, 'u').replace(/ñ/g, 'n')
        .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'ny-side';
    }

    var PREVIEW_CSS = [
      "@import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@400;500;600&display=swap');",
      "html, body { margin: 0; padding: 0; }",
      ".nlm * { box-sizing: border-box; }",
      ".nlm { font-family: 'Raleway', system-ui, sans-serif; color: #3D3529; background: #F5F0E8; min-height: 100vh; }",
      /* URL bar */
      ".nlm-slug-bar { background: #EBF0EC; border-bottom: 1px solid rgba(212,196,168,0.6); padding: 10px 28px; font-size: 12px; color: #5A7A65; display: flex; align-items: center; gap: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }",
      ".nlm-slug-bar small { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; font-size: 10px; color: #6B5E52; font-family: 'Raleway', sans-serif; }",
      /* Top nav */
      ".nlm-nav { position: sticky; top: 0; z-index: 50; background: rgba(245,240,232,0.95); backdrop-filter: blur(6px); border-bottom: 1px solid rgba(212,196,168,0.6); padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }",
      ".nlm-logo { font-family: 'Lora', Georgia, serif; font-size: 18px; font-weight: 600; color: #3D3529; }",
      ".nlm-nav-items { display: flex; gap: 22px; align-items: center; font-size: 13px; }",
      ".nlm-nav-item { color: #6B5E52; font-weight: 500; }",
      ".nlm-nav-cta { background: #5A7A65; color: #F5F0E8; padding: 6px 18px; border-radius: 999px; font-size: 12px; font-weight: 600; }",
      /* Page header */
      ".nlm-header { position: relative; min-height: 280px; padding: 60px 36px 50px; overflow: hidden; background: linear-gradient(to bottom, #BBD5C5 0%, #EBF0EC 60%, #F5F0E8 100%); }",
      ".nlm-header.has-image .nlm-header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; opacity: 0.6; }",
      ".nlm-header.has-image .nlm-header-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(187,213,197,0.55) 0%, rgba(235,240,236,0.7) 65%, rgba(245,240,232,1) 100%); z-index: 1; }",
      ".nlm-header-inner { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; text-align: center; }",
      ".nlm-eyebrow { font-size: 11px; font-weight: 600; color: #5A7A65; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }",
      ".nlm-title { font-family: 'Lora', Georgia, serif; font-size: 38px; font-weight: 600; color: #3D3529; margin: 0 0 16px; line-height: 1.15; letter-spacing: -0.01em; }",
      ".nlm-excerpt { font-size: 16px; line-height: 1.6; color: #4A3F35; margin: 0; }",
      /* Body */
      ".nlm-body { max-width: 720px; margin: 0 auto; padding: 40px 36px 60px; }",
      ".nlm-body h2 { font-family: 'Lora', Georgia, serif; font-size: 26px; font-weight: 600; color: #3D3529; margin: 36px 0 14px; }",
      ".nlm-body h3 { font-family: 'Lora', Georgia, serif; font-size: 20px; font-weight: 600; color: #3D3529; margin: 28px 0 10px; }",
      ".nlm-body p { font-size: 16px; line-height: 1.7; color: #4A3F35; margin: 0 0 16px; }",
      ".nlm-body ul { margin: 0 0 18px; padding: 0; list-style: none; }",
      ".nlm-body ul li { position: relative; padding-left: 22px; margin-bottom: 8px; color: #4A3F35; line-height: 1.6; }",
      ".nlm-body ul li::before { content: '—'; position: absolute; left: 0; color: #7C9885; font-weight: 600; }",
      ".nlm-body strong { color: #3D3529; font-weight: 600; }",
      ".nlm-body em { color: #6B5E52; }",
      ".nlm-body img { width: 100%; border-radius: 18px; margin: 24px 0; box-shadow: 0 4px 20px rgba(61,53,41,0.10); }",
      ".nlm-body .billede-sektion { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; margin: 28px 0; }",
      ".nlm-body .billede-sektion img { margin: 0; }",
      /* CTA */
      ".nlm-cta { max-width: 720px; margin: 0 auto 50px; padding: 28px 32px; background: #5A7A65; color: #F5F0E8; border-radius: 20px; text-align: center; }",
      ".nlm-cta h3 { font-family: 'Lora', Georgia, serif; font-size: 22px; margin: 0 0 6px; color: #F5F0E8; }",
      ".nlm-cta p { font-size: 14px; opacity: 0.9; margin: 0; }",
      /* SEO box */
      ".nlm-seo { padding: 24px 36px; background: #F7F3EC; border-top: 1px solid rgba(212,196,168,0.5); font-size: 13px; color: #6B5E52; }",
      ".nlm-seo-label { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; font-size: 10px; color: #5A7A65; margin-bottom: 8px; }",
      ".nlm-seo-google-title { color: #1a0dab; font-size: 18px; font-family: serif; margin-bottom: 2px; }",
      ".nlm-seo-google-url { color: #006621; font-size: 12px; margin-bottom: 4px; }",
      ".nlm-seo-google-desc { color: #545454; line-height: 1.5; }",
      ".nlm-empty { padding: 60px 36px; text-align: center; color: #6B5E52; font-style: italic; font-size: 14px; }",
      /* Menu preview */
      ".menu-preview { font-family: 'Raleway', sans-serif; background: #F5F0E8; border: 1px solid rgba(212,196,168,0.6); padding: 22px 26px; border-radius: 14px; margin: 16px; box-shadow: 0 2px 14px rgba(61,53,41,0.08); color: #3D3529; }",
      ".menu-preview h3 { font-family: 'Lora', Georgia, serif; font-size: 20px; font-weight: 600; margin: 0 0 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(212,196,168,0.6); }",
      ".menu-preview-row { display: flex; flex-wrap: wrap; align-items: center; gap: 22px; }",
      ".menu-preview-item { font-size: 14px; font-weight: 500; color: #6B5E52; display: inline-flex; align-items: center; gap: 4px; }",
      ".menu-preview-item.contact { background: #5A7A65; color: #F5F0E8; padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; }",
      ".menu-preview-section { margin-top: 16px; }",
      ".menu-preview-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: #5A7A65; margin-bottom: 8px; }",
      ".menu-preview-children { padding-left: 18px; border-left: 2px solid rgba(212,196,168,0.6); display: flex; flex-direction: column; gap: 6px; }",
      ".menu-preview-child { font-size: 13px; color: #6B5E52; }",
      ".menu-preview-empty { font-size: 13px; color: #6B5E52; font-style: italic; }",
      ".menu-preview-note { margin-top: 18px; padding-top: 14px; border-top: 1px dashed rgba(212,196,168,0.6); font-size: 12px; color: #6B5E52; line-height: 1.5; }"
    ].join('\n');

    function setup() {
      if (typeof CMS === 'undefined' || typeof h === 'undefined') {
        setTimeout(setup, 100);
        return;
      }

      // Inject CSS i preview iframe
      CMS.registerPreviewStyle(PREVIEW_CSS, { raw: true });

      /* ---------- Side preview ---------- */
      var PagePreview = function (props) {
        var data = props.entry.get('data');
        var title = data.get('title') || '';
        var description = data.get('description') || '';
        var image = data.get('image') || '';
        var imageAlt = data.get('imageAlt') || '';
        var excerpt = data.get('excerpt') || '';
        var menuParent = data.get('menuParent') || '';
        var slug = computeSlug(title);
        var url = '/' + slug;

        // Hardkodet topnav der matcher den rigtige
        var navItems = ['Om mig', 'Angst', 'Stress', 'Mistrivsel', 'Manipulation'];

        var slugBarItems = [
          h('small', { key: 'l' }, 'URL:'),
          h('span', { key: 'u' }, url)
        ];
        if (menuParent) {
          slugBarItems.push(h('small', { key: 'm', style: { marginLeft: 'auto' } }, 'Under: ' + menuParent));
        }

        var navItemsEl = navItems.map(function (label, i) {
          return h('span', { key: i, className: 'nlm-nav-item' }, label);
        });
        navItemsEl.push(h('span', { key: 'k', className: 'nlm-nav-cta' }, 'Kontakt'));

        var headerBg = image
          ? [
              h('div', { key: 'bg', className: 'nlm-header-bg', style: { backgroundImage: 'url(' + image + ')' } }),
              h('div', { key: 'ov', className: 'nlm-header-overlay' })
            ]
          : [];

        var headerInner = h('div', { className: 'nlm-header-inner' },
          h('div', { className: 'nlm-eyebrow' }, 'Naturliglivsmestring'),
          h('h1', { className: 'nlm-title' }, title || '(Sidetitel)'),
          excerpt ? h('p', { className: 'nlm-excerpt' }, excerpt) : null
        );

        var bodyContent = props.widgetFor('body');
        var bodyEl = bodyContent
          ? h('div', { className: 'nlm-body' }, bodyContent)
          : h('div', { className: 'nlm-empty' }, 'Skriv indhold til siden i feltet "Indhold" til venstre — det vises her live.');

        return h('div', { className: 'nlm' },
          h('div', { className: 'nlm-slug-bar' }, slugBarItems),
          h('div', { className: 'nlm-nav' },
            h('div', { className: 'nlm-logo' }, 'Naturliglivsmestring'),
            h('div', { className: 'nlm-nav-items' }, navItemsEl)
          ),
          h('div', { className: image ? 'nlm-header has-image' : 'nlm-header' }, headerBg.concat([headerInner])),
          bodyEl,
          h('div', { className: 'nlm-cta' },
            h('h3', null, 'Tag det første skridt'),
            h('p', null, 'Kontakt mig i dag for en uforpligtende samtale')
          ),
          description
            ? h('div', { className: 'nlm-seo' },
                h('div', { className: 'nlm-seo-label' }, 'Sådan vises siden i Google'),
                h('div', { className: 'nlm-seo-google-title' }, title || '(Sidetitel)'),
                h('div', { className: 'nlm-seo-google-url' }, 'naturliglivsmestring.vercel.app' + url),
                h('div', { className: 'nlm-seo-google-desc' }, description)
              )
            : null
        );
      };

      CMS.registerPreviewTemplate('pages', PagePreview);

      /* ---------- Menu preview ---------- */
      var MenuPreview = function (props) {
        var data = props.entry.get('data');
        var itemsImm = data && data.get('items');
        var items = itemsImm ? itemsImm.toJS() : [];

        var hasAnyChildren = items.some(function (it) {
          return Array.isArray(it.children) && it.children.length > 0;
        });

        var row = items.length === 0
          ? [h('div', { key: 'e', className: 'menu-preview-empty' }, 'Ingen menupunkter endnu.')]
          : items.map(function (item, i) {
              var hasChildren = Array.isArray(item.children) && item.children.length > 0;
              var isContact = (item.href || '') === '/kontakt';
              var cls = 'menu-preview-item' + (isContact ? ' contact' : '');
              return h('span', { key: i, className: cls }, (item.label || '(uden navn)') + (hasChildren ? ' ▾' : ''));
            });

        var childrenSections = items
          .filter(function (it) { return Array.isArray(it.children) && it.children.length > 0; })
          .map(function (it, i) {
            return h('div', { key: i, className: 'menu-preview-section' },
              h('div', { className: 'menu-preview-section-label' }, 'Under "' + (it.label || '') + '"'),
              h('div', { className: 'menu-preview-children' },
                it.children.map(function (c, j) {
                  return h('span', { key: j, className: 'menu-preview-child' }, (c.label || '(uden navn)') + (c.href ? ' → ' + c.href : ''));
                })
              )
            );
          });

        return h('div', { className: 'menu-preview' },
          h('h3', null, 'Sådan kommer menuen til at se ud'),
          h('div', { className: 'menu-preview-row' }, row),
          hasAnyChildren ? h('div', null, childrenSections) : null,
          hasAnyChildren ? h('div', { className: 'menu-preview-note' }, 'Dropdown-menupunkter vises med ▾. Hold musen over dem på hjemmesiden for at se underpunkterne.') : null
        );
      };

      CMS.registerPreviewTemplate('navigation', MenuPreview);
    }

    setup();
  })();
  </script>
</body>
</html>
