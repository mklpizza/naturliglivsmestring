<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Indholdsstyring — Naturliglivsmestring</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const h = window.h || (window.React && window.React.createElement);

    /* ---------------- Slug generator (matcher Decap CMS ascii/clean_accents) ---------------- */
    function computeSlug(title) {
      if (!title) return 'ny-side';
      return title
        .toString()
        .toLowerCase()
        .replace(/æ/g, 'ae')
        .replace(/ø/g, 'oe')
        .replace(/å/g, 'aa')
        .replace(/é|è|ê|ë/g, 'e')
        .replace(/á|à|â|ä/g, 'a')
        .replace(/í|ì|î|ï/g, 'i')
        .replace(/ó|ò|ô|ö/g, 'o')
        .replace(/ú|ù|û|ü/g, 'u')
        .replace(/ñ/g, 'n')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        || 'ny-side';
    }

    /* ---------------- Delte styles for preview-paneler ---------------- */
    const SharedStyles = `
      .nlm-preview * { box-sizing: border-box; }
      .nlm-preview {
        font-family: 'Raleway', system-ui, sans-serif;
        color: #3D3529;
        background: #F5F0E8;
        min-height: 100vh;
      }
      .nlm-slug-bar {
        background: #EBF0EC;
        border-bottom: 1px solid rgba(212, 196, 168, 0.6);
        padding: 10px 26px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #5A7A65;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nlm-slug-bar-label {
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        font-size: 10px;
        color: #6B5E52;
        font-family: 'Raleway', sans-serif;
      }
      .nlm-page-header {
        position: relative;
        min-height: 280px;
        padding: 60px 36px 50px;
        overflow: hidden;
        background: linear-gradient(to bottom, #BBD5C5 0%, #EBF0EC 60%, #F5F0E8 100%);
      }
      .nlm-page-header.has-image::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: var(--bg-image);
        background-size: cover;
        background-position: center;
        z-index: 0;
        opacity: 0.55;
      }
      .nlm-page-header.has-image::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(187,213,197,0.55) 0%, rgba(235,240,236,0.7) 65%, rgba(245,240,232,1) 100%);
        z-index: 1;
      }
      .nlm-page-header-inner {
        position: relative;
        z-index: 2;
        max-width: 720px;
        margin: 0 auto;
        text-align: center;
      }
      .nlm-eyebrow {
        font-size: 11px;
        font-weight: 600;
        color: #5A7A65;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 12px;
      }
      .nlm-title {
        font-family: 'Lora', Georgia, serif;
        font-size: 38px;
        font-weight: 600;
        color: #3D3529;
        margin: 0 0 16px;
        line-height: 1.15;
        letter-spacing: -0.01em;
      }
      .nlm-excerpt {
        font-size: 16px;
        line-height: 1.6;
        color: #4A3F35;
        margin: 0;
      }
      .nlm-body {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 36px 60px;
      }
      .nlm-body h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 26px;
        font-weight: 600;
        color: #3D3529;
        margin: 36px 0 14px;
      }
      .nlm-body h3 {
        font-family: 'Lora', Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        color: #3D3529;
        margin: 28px 0 10px;
      }
      .nlm-body p {
        font-size: 16px;
        line-height: 1.7;
        color: #4A3F35;
        margin: 0 0 16px;
      }
      .nlm-body ul {
        margin: 0 0 18px;
        padding: 0;
        list-style: none;
      }
      .nlm-body ul li {
        position: relative;
        padding-left: 22px;
        margin-bottom: 8px;
        color: #4A3F35;
        line-height: 1.6;
      }
      .nlm-body ul li::before {
        content: '—';
        position: absolute;
        left: 0;
        color: #7C9885;
        font-weight: 600;
      }
      .nlm-body strong { color: #3D3529; font-weight: 600; }
      .nlm-body em { color: #6B5E52; }
      .nlm-body img {
        width: 100%;
        border-radius: 18px;
        margin: 24px 0;
        box-shadow: 0 4px 20px rgba(61, 53, 41, 0.10);
      }
      .nlm-body .billede-sektion {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        align-items: start;
        margin: 28px 0;
      }
      .nlm-body .billede-sektion > div:has(> p > img),
      .nlm-body .billede-sektion > div:has(> img) {
        align-self: center;
      }
      .nlm-body .billede-sektion img { margin: 0; }
      .nlm-cta {
        max-width: 720px;
        margin: 0 auto 60px;
        padding: 28px 32px;
        background: #5A7A65;
        color: #F5F0E8;
        border-radius: 20px;
        text-align: center;
      }
      .nlm-cta h3 {
        font-family: 'Lora', Georgia, serif;
        font-size: 22px;
        margin: 0 0 6px;
        color: #F5F0E8;
      }
      .nlm-cta p {
        font-size: 14px;
        opacity: 0.9;
        margin: 0;
      }
      .nlm-empty-state {
        padding: 50px 30px;
        text-align: center;
        color: #6B5E52;
        font-style: italic;
        font-size: 14px;
      }

      /* Menu preview */
      .menu-preview {
        font-family: 'Raleway', system-ui, sans-serif;
        background: #F5F0E8;
        border: 1px solid rgba(212, 196, 168, 0.6);
        padding: 22px 26px;
        border-radius: 14px;
        margin: 16px;
        box-shadow: 0 2px 14px rgba(61, 53, 41, 0.08);
        color: #3D3529;
      }
      .menu-preview-title {
        font-family: 'Lora', Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(212, 196, 168, 0.6);
      }
      .menu-preview-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 22px;
      }
      .menu-preview-item {
        font-size: 14px;
        font-weight: 500;
        color: #6B5E52;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .menu-preview-item.contact {
        background: #5A7A65;
        color: #F5F0E8;
        padding: 6px 18px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
      }
      .menu-preview-section { margin-top: 16px; }
      .menu-preview-section-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        color: #5A7A65;
        margin-bottom: 8px;
      }
      .menu-preview-children {
        margin-top: 10px;
        padding-left: 18px;
        border-left: 2px solid rgba(212, 196, 168, 0.6);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .menu-preview-child {
        font-size: 13px;
        color: #6B5E52;
      }
      .menu-preview-empty {
        font-size: 13px;
        color: #6B5E52;
        font-style: italic;
      }
      .menu-preview-note {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px dashed rgba(212, 196, 168, 0.6);
        font-size: 12px;
        color: #6B5E52;
        line-height: 1.5;
      }
    `;

    CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@400;500;600&display=swap');
    CMS.registerPreviewStyle('data:text/css;base64,' + btoa(SharedStyles));

    /* ---------------- Side-preview ---------------- */
    function PagePreview(props) {
      const data = props.entry.get('data');
      const title = data.get('title') || '';
      const description = data.get('description') || '';
      const image = data.get('image') || '';
      const imageAlt = data.get('imageAlt') || '';
      const excerpt = data.get('excerpt') || '';
      const menuParent = data.get('menuParent') || '';
      const slug = computeSlug(title);
      const url = '/' + slug;

      const headerInner = h('div', { className: 'nlm-page-header-inner' },
        h('div', { className: 'nlm-eyebrow' }, 'Naturliglivsmestring'),
        h('h1', { className: 'nlm-title' }, title || '(Sidetitel)'),
        excerpt && h('p', { className: 'nlm-excerpt' }, excerpt)
      );

      const headerProps = image
        ? { className: 'nlm-page-header has-image', style: { '--bg-image': "url('" + image + "')" } }
        : { className: 'nlm-page-header' };

      return h('div', { className: 'nlm-preview' },
        h('div', { className: 'nlm-slug-bar' },
          h('span', { className: 'nlm-slug-bar-label' }, 'URL:'),
          h('span', null, url),
          menuParent && h('span', { className: 'nlm-slug-bar-label', style: { marginLeft: 'auto' } }, 'I menu under: ' + menuParent)
        ),
        h('div', headerProps, headerInner),
        h('div', { className: 'nlm-body' }, props.widgetFor('body') || h('div', { className: 'nlm-empty-state' }, 'Skriv indhold til siden i feltet "Indhold" til venstre.')),
        h('div', { className: 'nlm-cta' },
          h('h3', null, 'Tag det første skridt'),
          h('p', null, 'Kontakt mig i dag for en uforpligtende samtale')
        ),
        description && h('div', { style: { padding: '20px 36px', borderTop: '1px solid rgba(212, 196, 168, 0.5)', fontSize: '12px', color: '#6B5E52' } },
          h('strong', { style: { color: '#5A7A65', display: 'block', marginBottom: '6px', fontSize: '11px', textTransform: 'uppercase', letterSpacing: '0.08em' } }, 'Vises i Google'),
          h('div', { style: { color: '#1a0dab', fontSize: '16px', marginBottom: '2px' } }, title || '(Sidetitel)'),
          h('div', { style: { color: '#006621', fontSize: '12px', marginBottom: '4px' } }, 'naturliglivsmestring.vercel.app' + url),
          h('div', null, description)
        )
      );
    }

    CMS.registerPreviewTemplate('pages', PagePreview);

    /* ---------------- Menu-preview ---------------- */
    function MenuPreview(props) {
      const data = props.entry.get('data');
      const itemsImm = data && data.get('items');
      const items = itemsImm ? itemsImm.toJS() : [];

      const hasAnyChildren = items.some(function(it) {
        return Array.isArray(it.children) && it.children.length > 0;
      });

      const rowChildren = items.length === 0
        ? [h('div', { key: 'empty', className: 'menu-preview-empty' }, 'Ingen menupunkter endnu — tilføj nogle til venstre.')]
        : items.map(function(item, i) {
            const hasChildren = Array.isArray(item.children) && item.children.length > 0;
            const isContact = (item.href || '') === '/kontakt';
            const classes = ['menu-preview-item'];
            if (isContact) classes.push('contact');
            return h('span', { key: i, className: classes.join(' ') }, (item.label || '(uden navn)') + (hasChildren ? ' ▾' : ''));
          });

      const childrenSections = items
        .filter(function(it) { return Array.isArray(it.children) && it.children.length > 0; })
        .map(function(it, i) {
          return h('div', { key: i, className: 'menu-preview-section' },
            h('div', { className: 'menu-preview-section-label' }, 'Under "' + (it.label || '') + '"'),
            h('div', { className: 'menu-preview-children' },
              it.children.map(function(c, j) {
                return h('span', { key: j, className: 'menu-preview-child' }, (c.label || '(uden navn)') + (c.href ? '  →  ' + c.href : ''));
              })
            )
          );
        });

      return h('div', null,
        h('style', null, SharedStyles),
        h('div', { className: 'menu-preview' },
          h('div', { className: 'menu-preview-title' }, 'Sådan kommer menuen til at se ud'),
          h('div', { className: 'menu-preview-row' }, rowChildren),
          hasAnyChildren && h('div', null, childrenSections),
          hasAnyChildren && h('div', { className: 'menu-preview-note' }, 'Dropdown-menupunkter vises med ▾. Hold musen over dem på hjemmesiden for at se underpunkterne.')
        )
      );
    }

    CMS.registerPreviewTemplate('navigation', MenuPreview);
  </script>
</body>
</html>
