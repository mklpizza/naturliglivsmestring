<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Indholdsstyring — Naturliglivsmestring</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Live preview af menuen — viser hvordan navmenuen kommer til at se ud på hjemmesiden
    const PreviewStyles = `
      .menu-preview * { box-sizing: border-box; }
      .menu-preview {
        font-family: 'Raleway', system-ui, sans-serif;
        background: #F5F0E8;
        border: 1px solid rgba(212, 196, 168, 0.6);
        padding: 22px 26px;
        border-radius: 14px;
        margin: 16px;
        box-shadow: 0 2px 14px rgba(61, 53, 41, 0.08);
        color: #3D3529;
      }
      .menu-preview-title {
        font-family: 'Lora', Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        color: #3D3529;
        margin: 0 0 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(212, 196, 168, 0.6);
      }
      .menu-preview-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 22px;
      }
      .menu-preview-item {
        font-size: 14px;
        font-weight: 500;
        color: #6B5E52;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .menu-preview-item-caret {
        font-size: 10px;
        margin-left: 2px;
        color: #6B5E52;
      }
      .menu-preview-item.contact {
        background: #5A7A65;
        color: #F5F0E8;
        padding: 6px 18px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
      }
      .menu-preview-children {
        margin-top: 12px;
        padding-left: 18px;
        border-left: 2px solid rgba(212, 196, 168, 0.6);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .menu-preview-child {
        font-size: 13px;
        color: #6B5E52;
      }
      .menu-preview-empty {
        font-size: 13px;
        color: #6B5E52;
        font-style: italic;
      }
      .menu-preview-section {
        margin-bottom: 16px;
      }
      .menu-preview-section-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        color: #5A7A65;
        margin-bottom: 8px;
      }
      .menu-preview-note {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px dashed rgba(212, 196, 168, 0.6);
        font-size: 12px;
        color: #6B5E52;
        line-height: 1.5;
      }
    `;

    const h = window.h || (window.React && window.React.createElement);

    function MenuPreview(props) {
      const data = props.entry.get('data');
      const itemsImm = data && data.get('items');
      const items = itemsImm ? itemsImm.toJS() : [];

      const hasAnyChildren = items.some(function(it) {
        return Array.isArray(it.children) && it.children.length > 0;
      });

      const rowChildren = items.length === 0
        ? [h('div', { key: 'empty', className: 'menu-preview-empty' }, 'Ingen menupunkter endnu — tilføj nogle til venstre.')]
        : items.map(function(item, i) {
            const hasChildren = Array.isArray(item.children) && item.children.length > 0;
            const isContact = (item.href || '') === '/kontakt';
            const classes = ['menu-preview-item'];
            if (isContact) classes.push('contact');

            const label = item.label || '(uden navn)';
            const parts = [label];
            if (hasChildren) {
              parts.push(h('span', { key: 'caret', className: 'menu-preview-item-caret' }, '▾'));
            }
            return h('span', { key: i, className: classes.join(' ') }, parts);
          });

      const childrenSections = items
        .filter(function(it) { return Array.isArray(it.children) && it.children.length > 0; })
        .map(function(it, i) {
          return h('div', { key: i, className: 'menu-preview-section' },
            h('div', { className: 'menu-preview-section-label' }, 'Under "' + (it.label || '') + '"'),
            h('div', { className: 'menu-preview-children' },
              it.children.map(function(c, j) {
                return h('span', { key: j, className: 'menu-preview-child' }, (c.label || '(uden navn)') + (c.href ? '  →  ' + c.href : ''));
              })
            )
          );
        });

      const noteChildren = ['Dropdown-menupunkter vises med ▾. Hold musen over dem på hjemmesiden for at se underpunkterne.'];

      return h('div', null,
        h('style', null, PreviewStyles),
        h('div', { className: 'menu-preview' },
          h('div', { className: 'menu-preview-title' }, 'Sådan kommer menuen til at se ud'),
          h('div', { className: 'menu-preview-row' }, rowChildren),
          hasAnyChildren && h('div', { style: { marginTop: '20px' } }, childrenSections),
          hasAnyChildren && h('div', { className: 'menu-preview-note' }, noteChildren)
        )
      );
    }

    CMS.registerPreviewTemplate('navigation', MenuPreview);
  </script>
</body>
</html>
