backend:
  name: github
  repo: mklpizza/naturliglivsmestring
  branch: master
  base_url: https://naturliglivsmestring.vercel.app
  auth_endpoint: api/oauth

locale: da

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: pages
    label: Sider
    label_singular: Side
    folder: content/pages
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Sidetitel", name: title, widget: string }
      - { label: "Beskrivelse (SEO)", name: description, widget: text }
      - { label: "Billede URL", name: image, widget: string, hint: "Indsæt et Unsplash-link, fx https://images.unsplash.com/photo-xxx?w=1200&auto=format&fit=crop&q=80" }
      - { label: "Billede beskrivelse", name: imageAlt, widget: string, hint: "Beskriv billedet kort, fx 'Person der sidder roligt ved vandet'" }
      - { label: "Uddrag", name: excerpt, widget: text, hint: "Vises under sidetitlen i headeren" }
      - label: "Tilføj til menu under (valgfri)"
        name: menuParent
        widget: relation
        required: false
        collection: menu
        file: navigation
        search_fields: ["items.*.label"]
        value_field: "items.*.label"
        display_fields: ["items.*.label"]
        hint: "Vælg et eksisterende menupunkt for at gøre denne side til et underpunkt. Lad være tom for at undlade siden fra menuen (eller tilføj den manuelt under Menu)."
      - { label: "Indhold", name: body, widget: markdown }

  - name: menu
    label: Menu
    label_singular: Menu
    files:
      - name: navigation
        label: Menu
        file: content/navigation.json
        fields:
          - label: "Menupunkter"
            name: items
            widget: list
            summary: "{{fields.label}}"
            hint: "Træk menupunkter op og ned for at ændre rækkefølgen. For at lave et dropdown-menupunkt — lad 'Link til side' stå tomt og tilføj underpunkter."
            fields:
              - { label: "Navn i menu", name: label, widget: string, hint: "Det der vises i menuen, fx 'Om mig'" }
              - { label: "Link til side", name: href, widget: string, required: false, hint: "Starter med / efterfulgt af sidens slug, fx /om-mig. Lad være tomt for dropdown-menupunkter." }
              - label: "Underpunkter (dropdown)"
                name: children
                widget: list
                required: false
                summary: "{{fields.label}} → {{fields.href}}"
                fields:
                  - { label: "Navn", name: label, widget: string }
                  - { label: "Link", name: href, widget: string, hint: "fx /angst" }
