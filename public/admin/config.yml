backend:
  name: github
  repo: mklpizza/naturliglivsmestring
  branch: master
  base_url: https://naturliglivsmestring.vercel.app
  auth_endpoint: api/oauth

locale: da

# Editorial workflow giver:
#  - "Gem" knap (gemmer som kladde på en separat branch)
#  - "Status" dropdown (kladde / under review / klar)
#  - "Publicer" knap (først når status er "klar")
# Vercel laver automatisk preview deployments for hver kladde-branch.
publish_mode: editorial_workflow
site_url: https://naturliglivsmestring.vercel.app
display_url: https://naturliglivsmestring.vercel.app

slug:
  encoding: ascii
  clean_accents: true

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: pages
    label: Sider
    label_singular: Side
    folder: content/pages
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}}  ·  {{menuParent | default('—')}}"
    fields:
      - { label: "Sidetitel", name: title, widget: string, hint: "URL'en for siden bliver automatisk dannet ud fra titlen — se forhåndsvisningen i højre side." }
      - { label: "Øverste billede", name: image, widget: image, required: false, hint: "Vælg et billede fra mediebiblioteket, eller upload et nyt. Du kan også indsætte en ekstern URL (fx Unsplash)." }
      - { label: "Billedebeskrivelse (SEO) til øverste billede", name: imageAlt, widget: string, required: false, hint: "Beskriv billedet kort for søgemaskiner og synshandicappede besøgende, fx 'Person der sidder roligt ved vandet'." }
      - { label: "Uddrag", name: excerpt, widget: text, required: false, hint: "Den korte tekst der vises under sidetitlen i sidehovedet." }
      - label: "Tilføj til menu (valgfri)"
        name: menuParent
        widget: relation
        required: false
        collection: menu
        file: navigation
        search_fields: ["items.*.label"]
        value_field: "items.*.label"
        display_fields: ["items.*.label"]
        hint: "Vælg et eksisterende menupunkt for at gøre denne side til et underpunkt. Lad være tom for at undlade siden fra menuen."
      - { label: "Indhold", name: body, widget: markdown }
      - { label: "Beskrivelse (SEO)", name: description, widget: text, hint: "Den tekst Google viser i søgeresultater. Gerne 130–160 tegn." }

  - name: menu
    label: Menu
    label_singular: Menu
    files:
      - name: navigation
        label: Menu
        file: content/navigation.json
        fields:
          - label: "Menupunkter"
            name: items
            widget: list
            summary: "{{fields.label}}"
            hint: "Træk menupunkter op og ned for at ændre rækkefølgen. For at lave et dropdown-menupunkt — lad 'Link til side' stå tomt og tilføj underpunkter."
            fields:
              - { label: "Navn i menu", name: label, widget: string, hint: "Det der vises i menuen, fx 'Om mig'" }
              - { label: "Link til side", name: href, widget: string, required: false, hint: "Starter med / efterfulgt af sidens slug, fx /om-mig. Lad være tomt for dropdown-menupunkter." }
              - label: "Underpunkter (dropdown)"
                name: children
                widget: list
                required: false
                summary: "{{fields.label}} → {{fields.href}}"
                fields:
                  - { label: "Navn", name: label, widget: string }
                  - { label: "Link", name: href, widget: string, hint: "fx /angst" }
