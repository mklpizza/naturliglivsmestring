backend:
  name: github
  repo: mklpizza/naturliglivsmestring
  branch: master
  base_url: https://naturliglivsmestring.vercel.app
  auth_endpoint: api/oauth

locale: da

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: pages
    label: Sider
    label_singular: Side
    folder: content/pages
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Sidetitel", name: title, widget: string }
      - { label: "Beskrivelse (SEO)", name: description, widget: text }
      - { label: "Billede URL", name: image, widget: string, hint: "Indsæt et Unsplash-link, fx https://images.unsplash.com/photo-xxx?w=1200&auto=format&fit=crop&q=80" }
      - { label: "Billede beskrivelse", name: imageAlt, widget: string, hint: "Beskriv billedet kort, fx 'Person der sidder roligt ved vandet'" }
      - { label: "Uddrag", name: excerpt, widget: text, hint: "Vises under sidetitlen i headeren" }
      - { label: "Indhold", name: body, widget: markdown }

  - name: settings
    label: Indstillinger
    files:
      - name: navigation
        label: Menu (navigation)
        file: content/navigation.json
        fields:
          - label: "Menupunkter"
            name: items
            widget: list
            summary: "{{fields.label}} → {{fields.href}}"
            fields:
              - { label: "Navn i menu", name: label, widget: string, hint: "Det der vises i menuen, fx 'Om mig'" }
              - { label: "Link til side", name: href, widget: string, hint: "Starter med / efterfulgt af sidens slug, fx /om-mig" }
